<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CP-Shop</title>
  <meta name="description" content="Login to your CP-Shop account.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container py-2">
    <header class="navbar navbar-expand-lg navbar-light custom-header fixed-top">
      <a class="navbar-brand ms-3" href="index.html">
        <img src="images/logo.png" alt="CP-Shop Logo" width="45" height="45">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-center" id="navbarText">
        <ul class="navbar-nav mb-2 mb-lg-0 gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html">Brand</a></li>
          <li class="nav-item"><a class="nav-link" href="product-page.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
      <div class="d-flex align-items-center gap-3">
        <div class="icon-actions">
          <button class="action-btn" id="btn-cart" aria-label="Shopping Cart">
            <i class="bi bi-cart3"></i>
            <span id="cart-badge" class="cart-badge d-none">0</span>
          </button>
          <button class="action-btn" id="btn-profile" aria-label="User Profile">
            <i class="bi bi-person-circle"></i>
          </button>
        </div>
      </div>
    </header>
  </div>

  <main class="container">
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-blob"></div>
        <div class="auth-body">
          <h1 class="auth-title">Login</h1>
          <p class="auth-subtext">Don't have an account? <a href="signup.html">sign up</a></p>

          <form id="login-form" novalidate>
            <div class="auth-field">
              <span class="auth-prefix">+855</span>
              <input type="tel" id="login-phone" placeholder="Phone number" autocomplete="tel">
            </div>
            <div class="auth-field">
              <i class="bi bi-lock text-muted"></i>
              <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
              <a href="#" class="auth-forgot">FORGOT</a>
            </div>

            <div id="login-error" class="auth-error d-none"></div>

            <div class="auth-submit-row">
              <button type="submit" class="auth-btn">Login <i class="bi bi-box-arrow-in-right"></i></button>
            </div>
          </form>

          <div class="auth-socials">
            <i class="bi bi-apple"></i>
            <i class="bi bi-facebook"></i>
            <i class="bi bi-google"></i>
            <i class="bi bi-twitter"></i>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
